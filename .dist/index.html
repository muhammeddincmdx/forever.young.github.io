<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forever Young</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="layout">
    <section class="intro">
      <p class="intro__text">Bu site şarkı keşfetmek için oluşturulmuştur. Farklı platformlardan çekilen popüler şarkılar listelenir ve liste güncellenir. Şarkıların üstüne tıklayarak YouTube'a gidilir.</p>
      <p id="last-updated" class="meta">Veri güncelleme tarihi: yukleniyor...</p>
    </section>

    <section id="chart-grid" class="grid" aria-live="polite">
      <article class="card card--status">
        <p class="card__title">Listeler yukleniyor...</p>
      </article>
    </section>

  </main>

  <script src="app.js" defer></script>
</body>
</html>
